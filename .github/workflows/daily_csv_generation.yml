name: Institutional Data Pipeline

on:

  schedule:
    - cron: "30 2 * * *"

  workflow_dispatch:

# =========================================================
# PREVENT OVERLAPPING RUNS
# =========================================================

concurrency:

  group: institutional-pipeline

  cancel-in-progress: true

# =========================================================
# REQUIRED PERMISSIONS
# =========================================================

permissions:
  contents: write

# =========================================================
# ENV VARIABLES
# =========================================================

env:

  PYTHONUNBUFFERED: "1"

  PIP_DISABLE_PIP_VERSION_CHECK: "1"

  TZ: "Asia/Kolkata"

# =========================================================
# JOBS
# =========================================================

jobs:

  build:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    strategy:

      fail-fast: false

    steps:

      # ===================================================
      # CHECKOUT
      # ===================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

      # ===================================================
      # SETUP PYTHON
      # ===================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

          cache: "pip"

      # ===================================================
      # SYSTEM INFO
      # ===================================================

      - name: System Information

        run: |

          echo "=================================="
          echo "SYSTEM INFORMATION"
          echo "=================================="

          python --version
          pip --version

          echo "CPU:"
          nproc

          echo "MEMORY:"
          free -h

      # ===================================================
      # INSTALL DEPENDENCIES
      # ===================================================

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip setuptools wheel

          pip install -r requirements.txt

      # ===================================================
      # CREATE DIRECTORIES
      # ===================================================

      - name: Create Required Directories

        run: |

          mkdir -p output
          mkdir -p database
          mkdir -p logs
          mkdir -p cache
          mkdir -p failed

      # ===================================================
      # CLEAN GENERATED FILES
      # ===================================================

      - name: Clean Old Generated Files

        run: |

          rm -f output/*.csv || true
          rm -f output/*.xlsx || true
          rm -f output/*.parquet || true

          rm -f database/*.db || true
          rm -f database/*.duckdb || true

      # ===================================================
      # RUN PIPELINE
      # ===================================================

      - name: Run Institutional Pipeline

        run: |

          echo "=================================="
          echo "STARTING PIPELINE"
          echo "=================================="

          python main.py

      # ===================================================
      # VERIFY OUTPUTS
      # ===================================================

      - name: Verify Outputs

        run: |

          echo "=================================="
          echo "OUTPUT FILES"
          echo "=================================="

          ls -lh output || true

          echo "=================================="
          echo "DATABASE FILES"
          echo "=================================="

          ls -lh database || true

      # ===================================================
      # UPLOAD CSV ARTIFACTS
      # ===================================================

      - name: Upload CSV Artifacts

        uses: actions/upload-artifact@v4

        with:

          name: institutional-csv-files

          path: |

            output/*.csv

          retention-days: 7

          if-no-files-found: warn

      # ===================================================
      # UPLOAD DATABASE ARTIFACTS
      # ===================================================

      - name: Upload Database Artifacts

        uses: actions/upload-artifact@v4

        with:

          name: institutional-database

          path: |

            database/*.db
            database/*.duckdb

          retention-days: 7

          if-no-files-found: warn

      # ===================================================
      # CONFIGURE GIT
      # ===================================================

      - name: Configure Git

        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ===================================================
      # STAGE FILES
      # ===================================================

      - name: Stage Generated Files

        run: |

          git add -f output/*.csv || true
          git add -f output/*.xlsx || true

          git add -f database/*.db || true
          git add -f database/*.duckdb || true

      # ===================================================
      # COMMIT FILES
      # ===================================================

      - name: Commit Generated Files

        run: |

          git diff --cached --quiet && echo "No changes detected" || git commit -m "Automated institutional pipeline update"

      # ===================================================
      # PUSH
      # ===================================================

      - name: Push Changes

        run: |

          git push origin main

      # ===================================================
      # SUCCESS MESSAGE
      # ===================================================

      - name: Success Message

        if: success()

        run: |

          echo "=================================="
          echo "PIPELINE COMPLETED SUCCESSFULLY"
          echo "=================================="

      # ===================================================
      # FAILURE DEBUGGING
      # ===================================================

      - name: Failure Diagnostics

        if: failure()

        run: |

          echo "=================================="
          echo "PIPELINE FAILED"
          echo "=================================="

          echo "OUTPUT:"
          ls -R output || true

          echo "DATABASE:"
          ls -R database || true

          echo "LOGS:"
          ls -R logs || true
